services:
  - type: web
    name: rentnear-backend
    runtime: node
    rootDir: rental-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ONESIGNAL_APP_ID
        value: 109c1bae-e0a1-4b1c-a781-53f1ab90e9ec
      - key: ONESIGNAL_REST_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SUREPASS_API_TOKEN
        sync: false
      - key: SUREPASS_ENV
        value: sandbox
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: onboarding@resend.dev
